# Tested and working on: LilyGO TTGO T3 LoRa32 433MHz V1.6.1 ESP32.
# Pin numbers throughout this file (SPI/SX1276/DIO2/I2C OLED) are specific to
# that exact board revision, check pinout before reusing on a different one.
esphome:
  name: somfy-rts-bridge
  friendly_name: Somfy RTS Bridge
  project:
    name: "danielpetrovic.Somfy RTS Bridge"
    version: "2026.07.4"
  # Sub-devices: each cover shows up as its own HA device (matching Overkiz's
  # per-shade/curtain granularity) instead of all bundled under the physical
  # board. Anything NOT assigned a device_id (OLED, Wi-Fi/IP sensor) stays on
  # the main "Somfy RTS Bridge" device, the hub, same role as TaHoma.
  # area names below must match existing HA areas exactly to link up instead
  # of creating duplicates.
  #
  # Device names DO include the room name (e.g. "Bedroom Curtain", not just
  # "Curtain"). Previously left generic, relying on HA core 2026.6's
  # auto-prefix-Area-onto-entity_id feature (PR #170560) to combine Area +
  # generic device name into the full display text - but that auto-prefixing
  # turned out unreliable in practice (confirmed independently: the existing
  # Overkiz integration's own entities show the same doubled-name symptom
  # this was meant to avoid), so relying on it wasn't actually buying
  # anything. Any resulting entity_id redundancy (e.g.
  # cover.bedroom_bedroom_curtain) is cosmetic only - this is an HA-side
  # slug-generation quirk, not something fixable from here.
  areas:
    - id: bedroom_area
      name: "Bedroom"
    - id: gameroom_area
      name: "Gameroom"
    - id: garden_area
      name: "Garden"
    - id: gym_area
      name: "Gym"
    - id: hallway_area
      name: "Hallway"
    - id: kitchen_area
      name: "Kitchen"
    - id: living_room_area
      name: "Living Room"
    - id: office_area
      name: "Office"
    - id: roof_terrace_area
      name: "Roof Terrace"
  devices:
    - id: bedroom_device
      name: "Bedroom Curtain"
      area_id: bedroom_area
    - id: gameroom_left_1_device
      name: "Gameroom Left 1 Shade"
      area_id: gameroom_area
    - id: gameroom_left_2_device
      name: "Gameroom Left 2 Shade"
      area_id: gameroom_area
    - id: gameroom_right_1_device
      name: "Gameroom Right 1 Shade"
      area_id: gameroom_area
    - id: gameroom_right_2_device
      name: "Gameroom Right 2 Shade"
      area_id: gameroom_area
    - id: garden_device
      name: "Garden Shade"
      area_id: garden_area
    - id: gym_device
      name: "Gym Curtain"
      area_id: gym_area
    - id: hallway_device
      name: "Hallway Shade"
      area_id: hallway_area
    - id: kitchen_device
      name: "Kitchen Shade"
      area_id: kitchen_area
    - id: living_room_device
      name: "Living Room Shade"
      area_id: living_room_area
    - id: office_left_device
      name: "Office Left Shade"
      area_id: office_area
    - id: office_right_device
      name: "Office Right Shade"
      area_id: office_area
    - id: roof_terrace_device
      name: "Roof Terrace Shade"
      area_id: roof_terrace_area
  # Applies the persisted Display Brightness/Page Interval globals (see
  # globals: below) to the real hardware - the YAML defaults on display:/
  # interval: only apply on a fresh flash, so without this a reboot would
  # revert to those defaults instead of the last value set from HA.
  on_boot:
    priority: 600
    then:
      - lambda: |-
          id(oled)->set_contrast(id(display_brightness));
          id(page_cycle_interval)->set_update_interval((uint32_t)(id(display_page_interval) * 1000));
          id(page_cycle_interval)->start_poller();

esp32:
  board: ttgo-lora32-v1
  framework:
    type: esp-idf

# Wi-Fi + API + OTA, fill in secrets.yaml before flashing
wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

api:
  encryption:
    key: !secret rts_bridge_api_key

ota:
  - platform: esphome
    password: !secret rts_bridge_ota_password

# level is the compile-time ceiling (VERY_VERBOSE keeps full protocol-decode
# detail available); initial_level is what actually prints after boot, kept
# quiet so normal operation doesn't flood the log with every heard frame.
# The Debug Logging switch below raises/lowers the runtime level on demand.
logger:
  level: VERY_VERBOSE
  initial_level: INFO

# Onboard SX1276 SPI wiring (LilyGO T3 LoRa32 V1.6.1, 433MHz variant)
spi:
  clk_pin: GPIO5
  mosi_pin: GPIO27
  miso_pin: GPIO19

sx127x:
  id: sx127x_id
  cs_pin: GPIO18
  rst_pin: GPIO23
  frequency: 433420000 # 433.42MHz, Somfy RTS specific, NOT the 433.92MHz ISM default
  modulation: OOK
  pa_pin: BOOST
  pa_power: 17
  bitsync: false
  packet_mode: false

# DIO2 is wired to GPIO32 on this board revision, required for raw OOK bit-banging
remote_receiver:
  id: rx_id
  pin:
    number: GPIO32
    allow_other_uses: true
  filter: 200us
  idle: 6000us

remote_transmitter:
  id: tx_id
  pin:
    number: GPIO32
    allow_other_uses: true
  eot_level: false
  carrier_duty_percent: 100%
  non_blocking: true
  on_transmit:
    - sx127x.set_mode_standby: sx127x_id
    - lambda: 'id(tx_id)->digital_write(false);'
    - sx127x.set_mode_tx: sx127x_id
  on_complete:
    - sx127x.set_mode_standby: sx127x_id
    - lambda: 'id(tx_id)->digital_write(true);'
    - sx127x.set_mode_rx: sx127x_id

external_components:
  - source:
      type: git
      url: https://github.com/swoboda1337/somfy-esphome
      ref: main
    refresh: 5min

# One package instance per physical RTS cover, see somfy-rts-cover.yaml for
# the shared logic (0%=DOWN, 50%=MY, 100%=UP, no time-based estimation).
# remote_address must be unique per cover and is never reused once paired,
# each is a fresh random 24-bit value.
packages:
  bedroom: !include
    file: somfy-rts-cover.yaml
    vars:
      cover_id: bedroom
      cover_name: "Bedroom Curtain"
      remote_address: "0xc2dd23"
      device_class: curtain
  gameroom_left_1: !include
    file: somfy-rts-cover.yaml
    vars:
      cover_id: gameroom_left_1
      cover_name: "Gameroom Left 1 Shade"
      remote_address: "0x1632f7"
      device_class: shade
  gameroom_left_2: !include
    file: somfy-rts-cover.yaml
    vars:
      cover_id: gameroom_left_2
      cover_name: "Gameroom Left 2 Shade"
      remote_address: "0xa210e7"
      device_class: shade
  gameroom_right_1: !include
    file: somfy-rts-cover.yaml
    vars:
      cover_id: gameroom_right_1
      cover_name: "Gameroom Right 1 Shade"
      remote_address: "0xdb7091"
      device_class: shade
  gameroom_right_2: !include
    file: somfy-rts-cover.yaml
    vars:
      cover_id: gameroom_right_2
      cover_name: "Gameroom Right 2 Shade"
      remote_address: "0xb829ab"
      device_class: shade
  garden: !include
    file: somfy-rts-cover.yaml
    vars:
      cover_id: garden
      cover_name: "Garden Shade"
      remote_address: "0x3a23e7"
      device_class: shade
  gym: !include
    file: somfy-rts-cover.yaml
    vars:
      cover_id: gym
      cover_name: "Gym Curtain"
      remote_address: "0xdbd983"
      device_class: curtain
  hallway: !include
    file: somfy-rts-cover.yaml
    vars:
      cover_id: hallway
      cover_name: "Hallway Shade"
      remote_address: "0x400b41"
      device_class: shade
  kitchen: !include
    file: somfy-rts-cover.yaml
    vars:
      cover_id: kitchen
      cover_name: "Kitchen Shade"
      remote_address: "0x147853"
      device_class: shade
  living_room: !include
    file: somfy-rts-cover.yaml
    vars:
      cover_id: living_room
      cover_name: "Living Room Shade"
      remote_address: "0x430281"
      device_class: shade
  office_left: !include
    file: somfy-rts-cover.yaml
    vars:
      cover_id: office_left
      cover_name: "Office Left Shade"
      remote_address: "0xf7efc1"
      device_class: shade
  office_right: !include
    file: somfy-rts-cover.yaml
    vars:
      cover_id: office_right
      cover_name: "Office Right Shade"
      remote_address: "0xb16420"
      device_class: shade
  roof_terrace: !include
    file: somfy-rts-cover.yaml
    vars:
      cover_id: roof_terrace
      cover_name: "Roof Terrace Shade"
      remote_address: "0x0ee6f0"
      device_class: shade

# Onboard SSD1306 128x64 OLED (no reset pin on this board revision)
i2c:
  sda: GPIO21
  scl: GPIO22

# Exposes free heap/block/fragmentation, loop time, and reset reason -
# only loop_time and reset_reason are actually used below (see their own
# comments for why); the others are skipped as not currently useful.
debug:

text_sensor:
  - platform: wifi_info
    ip_address:
      name: "IP Address"
      id: wifi_ip
      entity_category: diagnostic
  # Why the board last rebooted (power-on, crash, watchdog, brownout, or a
  # deliberate restart - which shows as "Reboot request from <component>",
  # e.g. our own Restart button, OTA, or an API-initiated reboot). Named to
  # match the "Restart" button below (YAML key stays reset_reason - that's
  # ESPHome's own name for this option, not user-facing).
  - platform: debug
    reset_reason:
      name: "Restart Reason"
      entity_category: diagnostic

# Bluetooth proxy: forwards BLE advertisements (and, since active: true is
# the default, allows HA to open active GATT connections through this board
# too) to Home Assistant. No RF conflict with the SX1276 sub-GHz radio above
# (different chip, different frequency entirely), but it DOES share the
# ESP32's own 2.4GHz radio with Wi-Fi via time-multiplexed coexistence -
# tried here first (not on the IO bridge) since this board's radio path is
# ESPHome's own RMT-backed remote_transmitter/receiver, not the IO bridge's
# hand-rolled ISR+Ticker state machine, so it's much less sensitive to any
# extra scheduling jitter BLE scanning introduces.
esp32_ble_tracker:

bluetooth_proxy:
  id: ble_proxy

# Diagnostic-only entities on the hub device: signal quality, uptime, loop
# time, and a remote restart, in case something needs troubleshooting
# without opening the ESPHome dashboard.
sensor:
  - platform: wifi_signal
    name: "WiFi Signal"
    entity_category: diagnostic
    update_interval: 60s
  - platform: uptime
    name: "Uptime"
    entity_category: diagnostic
    update_interval: 60s
  # How long the last main loop iteration took - normally near-zero;
  # a persistent, HA-visible way to notice a component stalling (e.g. BLE
  # scanning jitter, a radio timing hiccup) without needing to catch it
  # live on a USB serial connection.
  - platform: debug
    loop_time:
      name: "Loop Time"
      entity_category: diagnostic

button:
  - platform: restart
    name: "Restart"
    entity_category: diagnostic

# Toggles full protocol decode logging on/off without a reflash. Scoped to
# the somfy component's own log tag only - a global level bump would also
# unmute unrelated components' own verbose logging (e.g. the OLED's I2C
# driver spamming every byte of every glyph write).
switch:
  - platform: template
    name: "Debug Logging"
    icon: mdi:bug
    optimistic: true
    restore_mode: ALWAYS_OFF
    turn_on_action:
      # Explicit, always-visible confirmation - ESPHome's own default
      # switch-toggle log line is normally DEBUG level, which `initial_level:
      # INFO` above (added in the same commit as this switch) silently
      # suppresses unless a tag is individually bumped - this bypasses that
      # by logging at INFO on the default/unfiltered tag before touching the
      # somfy tag's own level below.
      - logger.log:
          format: "Debug Logging turned ON"
          level: INFO
      - logger.set_level: {level: VERY_VERBOSE, tag: somfy}
    turn_off_action:
      - logger.log:
          format: "Debug Logging turned OFF"
          level: INFO
      - logger.set_level: {level: INFO, tag: somfy}
  # Blanks the OLED without cutting power - useful for a wall-mounted unit at
  # night, and reduces long-term burn-in. Reflects real hardware state
  # (is_on()), not just an assumed toggle.
  - platform: template
    name: "Display"
    icon: mdi:monitor
    entity_category: config
    lambda: return id(oled)->is_on();
    turn_on_action:
      - lambda: id(oled)->turn_on();
      - logger.log:
          format: "Display turned ON"
          level: INFO
    turn_off_action:
      - lambda: id(oled)->turn_off();
      - logger.log:
          format: "Display turned OFF"
          level: INFO

# Display Brightness actually drives the SSD1306's contrast register (0x81) -
# there's no separate backlight to dim on this panel, contrast is what
# changes perceived brightness. Display Page Interval reads/writes the
# page_cycle_interval component above via PollingComponent's own
# get/set_update_interval() - but set_update_interval() alone only updates
# the stored value, it does NOT rearm the already-scheduled timer (that's
# set once in PollingComponent::call_setup() and never re-read), so
# start_poller() is also called to actually reschedule with the new value.
#
# Both numbers use lambda: (not optimistic:) for real hardware read-back,
# which means TemplateNumber::control() does NOT publish the new value to HA
# immediately - it only republishes on the next scheduled poll, so without
# the explicit update() call below HA's displayed value would lag up to
# update_interval (60s) behind whatever was just set.
globals:
  - id: display_brightness
    type: float
    restore_value: true
    initial_value: "0.1"
  - id: display_page_interval
    type: float
    restore_value: true
    initial_value: "2.0"

number:
  - platform: template
    id: display_brightness_number
    name: "Display Brightness"
    icon: mdi:brightness-6
    entity_category: config
    min_value: 0.1
    max_value: 1.0
    step: 0.05
    update_interval: 60s
    lambda: return id(oled)->get_contrast();
    set_action:
      - lambda: |-
          id(oled)->set_contrast(x);
          id(display_brightness) = x;
          id(display_brightness_number)->update();
          ESP_LOGI("main", "Display Brightness set to %.2f", x);
  - platform: template
    id: display_page_interval_number
    name: "Display Page Interval"
    icon: mdi:timer-outline
    entity_category: config
    unit_of_measurement: s
    min_value: 1
    max_value: 30
    step: 1
    update_interval: 60s
    lambda: return id(page_cycle_interval)->get_update_interval() / 1000.0f;
    set_action:
      - lambda: |-
          id(page_cycle_interval)->set_update_interval((uint32_t)(x * 1000));
          id(page_cycle_interval)->start_poller();
          id(display_page_interval) = x;
          id(display_page_interval_number)->update();
          ESP_LOGI("main", "Display Page Interval set to %.0fs", x);

font:
  - file: "gfonts://Roboto"
    id: my_font
    size: 14

# Shared 3rd OLED line (y=40, unused by every cover page below) - substituted
# verbatim into each page's lambda so the BLE status snippet is defined once
# instead of duplicated 13 times. See the bluetooth_proxy: comment above for
# what "Proxying" vs the raw scanner states mean.
substitutions:
  bt_status_line: |-
    auto bt_state = esphome::esp32_ble_tracker::global_esp32_ble_tracker->get_scanner_state();
    const char *bt_str;
    if (bt_state == esphome::esp32_ble_tracker::ScannerState::FAILED) {
      bt_str = "Failed";
    } else if (id(ble_proxy)->get_api_connection() != nullptr) {
      bt_str = "Proxying";
    } else {
      switch (bt_state) {
        case esphome::esp32_ble_tracker::ScannerState::IDLE: bt_str = "Idle"; break;
        case esphome::esp32_ble_tracker::ScannerState::STARTING: bt_str = "Starting"; break;
        case esphome::esp32_ble_tracker::ScannerState::RUNNING: bt_str = "Running"; break;
        case esphome::esp32_ble_tracker::ScannerState::STOPPING: bt_str = "Stopping"; break;
        default: bt_str = "?"; break;
      }
    }
    it.printf(0, 40, id(my_font), "BT: %s", bt_str);

display:
  - platform: ssd1306_i2c
    id: oled
    model: "SSD1306 128x64"
    address: 0x3C
    # Low by default (adjustable via the Display Brightness number) - plenty
    # readable up close, and reduces long-term OLED burn-in risk.
    contrast: 0.1
    pages:
      - id: page_bedroom
        lambda: |-
          it.printf(0, 0, id(my_font), "Bedroom Curtain");
          it.printf(0, 20, id(my_font), "%.0f%%", id(bedroom_position) * 100.0f);
          ${bt_status_line}
      - id: page_gameroom_left_1
        lambda: |-
          it.printf(0, 0, id(my_font), "Gameroom L1");
          it.printf(0, 20, id(my_font), "%.0f%%", id(gameroom_left_1_position) * 100.0f);
          ${bt_status_line}
      - id: page_gameroom_left_2
        lambda: |-
          it.printf(0, 0, id(my_font), "Gameroom L2");
          it.printf(0, 20, id(my_font), "%.0f%%", id(gameroom_left_2_position) * 100.0f);
          ${bt_status_line}
      - id: page_gameroom_right_1
        lambda: |-
          it.printf(0, 0, id(my_font), "Gameroom R1");
          it.printf(0, 20, id(my_font), "%.0f%%", id(gameroom_right_1_position) * 100.0f);
          ${bt_status_line}
      - id: page_gameroom_right_2
        lambda: |-
          it.printf(0, 0, id(my_font), "Gameroom R2");
          it.printf(0, 20, id(my_font), "%.0f%%", id(gameroom_right_2_position) * 100.0f);
          ${bt_status_line}
      - id: page_garden
        lambda: |-
          it.printf(0, 0, id(my_font), "Garden Shade");
          it.printf(0, 20, id(my_font), "%.0f%%", id(garden_position) * 100.0f);
          ${bt_status_line}
      - id: page_gym
        lambda: |-
          it.printf(0, 0, id(my_font), "Gym Curtain");
          it.printf(0, 20, id(my_font), "%.0f%%", id(gym_position) * 100.0f);
          ${bt_status_line}
      - id: page_hallway
        lambda: |-
          it.printf(0, 0, id(my_font), "Hallway");
          it.printf(0, 20, id(my_font), "%.0f%%", id(hallway_position) * 100.0f);
          ${bt_status_line}
      - id: page_kitchen
        lambda: |-
          it.printf(0, 0, id(my_font), "Kitchen");
          it.printf(0, 20, id(my_font), "%.0f%%", id(kitchen_position) * 100.0f);
          ${bt_status_line}
      - id: page_living_room
        lambda: |-
          it.printf(0, 0, id(my_font), "Living Room");
          it.printf(0, 20, id(my_font), "%.0f%%", id(living_room_position) * 100.0f);
          ${bt_status_line}
      - id: page_office_left
        lambda: |-
          it.printf(0, 0, id(my_font), "Office Left");
          it.printf(0, 20, id(my_font), "%.0f%%", id(office_left_position) * 100.0f);
          ${bt_status_line}
      - id: page_office_right
        lambda: |-
          it.printf(0, 0, id(my_font), "Office Right");
          it.printf(0, 20, id(my_font), "%.0f%%", id(office_right_position) * 100.0f);
          ${bt_status_line}
      - id: page_roof_terrace
        lambda: |-
          it.printf(0, 0, id(my_font), "Roof Terrace");
          it.printf(0, 20, id(my_font), "%.0f%%", id(roof_terrace_position) * 100.0f);
          ${bt_status_line}
      - id: page_status
        lambda: |-
          it.printf(0, 0, id(my_font), "Somfy RTS Bridge");
          it.printf(0, 20, id(my_font), "IP: %s", id(wifi_ip).state.c_str());
          ${bt_status_line}

# Cycle through each cover's page automatically.
interval:
  - id: page_cycle_interval
    interval: 2s
    then:
      - display.page.show_next: oled
      - component.update: oled
